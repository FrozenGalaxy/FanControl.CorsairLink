name: Build & Publish Full Output

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
  
    - name: Download FanControl Plugins DLL (net10)
      shell: pwsh
      run: |
        Invoke-WebRequest https://github.com/Rem0o/FanControl.Releases/releases/latest/download/FanControl_265_net_10_0.zip -OutFile fancontrol.zip
        Expand-Archive fancontrol.zip -DestinationPath fancontrol
        New-Item -ItemType Directory -Force -Path ref | Out-Null
        Copy-Item fancontrol\FanControl.Plugins.dll ref\FanControl.Plugins.dll
        
    - name: Add Unsafe dependency for tests
      run: dotnet add test/CorsairLink.Tests/CorsairLink.Tests.csproj package System.Runtime.CompilerServices.Unsafe
      
    - name: Restore solution
      run: dotnet restore src/FanControl.CorsairLink.sln

    - name: Build solution (Release)
      run: dotnet build src/FanControl.CorsairLink.sln -c Release --no-restore

    - name: Run tests
      run: dotnet test src/FanControl.CorsairLink.sln -c Release --no-build

    - name: Publish merged plugin
      shell: pwsh
      run: |
        $src = "src/FanControl.CorsairLink/bin/Release/net10.0/FanControl.CorsairLink.merged.dll"
        if (!(Test-Path $src)) { throw "Merged DLL not found: $src" }
    
        New-Item -ItemType Directory -Force -Path publish | Out-Null
        Copy-Item $src publish/FanControl.CorsairLink.dll

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CorsairLinkPlugin-Full
        path: publish
